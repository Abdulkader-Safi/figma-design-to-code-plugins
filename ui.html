<style>
    :root {
        font-family:
            Inter,
            -apple-system,
            system-ui,
            sans-serif;
    }
    * {
        box-sizing: border-box;
    }
    body {
        margin: 0;
        padding: 14px;
        color: var(--figma-color-text);
        background: var(--figma-color-bg);
        font-size: 12px;
    }
    h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 2px;
    }
    .sub {
        color: var(--figma-color-text-secondary);
        margin: 0 0 12px;
        line-height: 1.4;
    }
    .row {
        display: flex;
        gap: 8px;
    }
    button {
        font: inherit;
        font-weight: 500;
        border: none;
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
    }
    button:disabled {
        opacity: 0.4;
        cursor: default;
    }
    .primary {
        background: var(--figma-color-bg-brand);
        color: var(--figma-color-text-onbrand);
        flex: 1;
    }
    .ghost {
        background: var(--figma-color-bg-secondary);
        color: var(--figma-color-text);
    }
    .status {
        margin: 10px 0;
        min-height: 15px;
        color: var(--figma-color-text-secondary);
    }
    .status.error {
        color: var(--figma-color-text-danger);
    }
    textarea {
        width: 100%;
        height: 380px;
        margin-top: 8px;
        padding: 10px;
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        background: var(--figma-color-bg-secondary);
        color: var(--figma-color-text);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 11px;
        line-height: 1.5;
        resize: vertical;
        white-space: pre;
        display: none;
    }
    .actions {
        display: none;
        gap: 8px;
        margin-top: 8px;
    }
</style>

<h1>Design to HTML</h1>
<p class="sub">
    Select a frame, then export it to a self-contained HTML file with layout,
    colors, and Google fonts.
</p>

<div class="row">
    <button id="export" class="primary">Export selected frame</button>
</div>

<div id="status" class="status"></div>

<textarea id="output" readonly spellcheck="false"></textarea>

<div id="actions" class="actions">
    <button id="copy" class="ghost">Copy</button>
    <button id="download" class="ghost">Download .html</button>
</div>

<script>
    const $ = (id) => document.getElementById(id);
    let fileName = "export";

    $("export").onclick = () => {
        setStatus("Generating…");
        parent.postMessage({ pluginMessage: { type: "export" } }, "*");
    };

    $("copy").onclick = async () => {
        $("output").select();
        document.execCommand("copy");
        setStatus("Copied to clipboard.");
    };

    $("download").onclick = () => {
        const blob = new Blob([$("output").value], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = fileName + ".html";
        a.click();
        URL.revokeObjectURL(a.href);
    };

    onmessage = (e) => {
        const msg = e.data.pluginMessage;
        if (!msg) return;
        if (msg.type === "error") {
            setStatus(msg.message, true);
            $("output").style.display = "none";
            $("actions").style.display = "none";
        } else if (msg.type === "result") {
            fileName = msg.name || "export";
            $("output").value = msg.code;
            $("output").style.display = "block";
            $("actions").style.display = "flex";
            setStatus(
                "Done. " + msg.code.split("\n").length + " lines generated.",
            );
        }
    };

    function setStatus(text, isError) {
        const s = $("status");
        s.textContent = text;
        s.className = "status" + (isError ? " error" : "");
    }
</script>

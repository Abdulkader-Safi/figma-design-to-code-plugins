<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"

/>

<style>
    /* Editorial workbench theme. Retheme by editing these. */
    :root {
        --bg: #0c0b0a;
        --surface: #16140f;
        --text: #f5f2ea;
        --muted: #8d887e;
        --hairline: rgba(245, 242, 234, 0.12);
        --hairline-strong: rgba(245, 242, 234, 0.22);
        --clay: #d97a4f;
        --sand: #cbb79b;
        --gold: #d9b779;
        --dim: #6f6a61;
        --display: "Space Grotesk", system-ui, sans-serif;
        --body: "Inter", system-ui, sans-serif;
        --mono:
            "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * {
        box-sizing: border-box;
    }

    html,
    body {
        height: 100%;
    }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 22px 22px 0;
        font-family: var(--body);
        font-size: 12px;
        color: var(--text);
        background:
            radial-gradient(
                120% 90% at 100% 0%,
                rgba(217, 122, 79, 0.06),
                transparent 55%
            ),
            var(--bg);
    }

    .kicker {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--clay);
        margin-bottom: 10px;
    }

    h1 {
        font-family: var(--display);
        font-weight: 700;
        font-size: 27px;
        line-height: 0.95;
        letter-spacing: -0.02em;
        margin: 0 0 9px;
    }
    h1 em {
        color: var(--clay);
        font-style: normal;
    }

    .sub {
        color: var(--muted);
        line-height: 1.5;
        margin: 0 0 16px;
        max-width: 36ch;
    }

    button {
        font: inherit;
        cursor: pointer;
        border: none;
    }
    button:disabled {
        opacity: 0.4;
        cursor: default;
    }

    .toggle {
        display: flex;
        align-items: center;
        gap: 9px;
        cursor: pointer;
        user-select: none;
    }
    .toggle input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
    }
    .toggle .box {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        border-radius: 5px;
        border: 1px solid var(--hairline-strong);
        background: var(--surface);
        transition:
            background 0.15s ease,
            border-color 0.15s ease;
        position: relative;
    }
    .toggle input:checked + .box {
        background: var(--clay);
        border-color: var(--clay);
    }
    .toggle input:checked + .box::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 2px;
        width: 4px;
        height: 8px;
        border: solid #0c0b0a;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
    }
    .toggle input:focus-visible + .box {
        outline: 2px solid var(--clay);
        outline-offset: 2px;
    }
    .toggle-text {
        font-size: 13px;
        color: var(--text);
        line-height: 1.2;
    }

    .cta {
        width: 100%;
        padding: 12px 16px;
        border-radius: 9px;
        font-weight: 600;
        color: #0c0b0a;
        background: var(--clay);
        transition: background 0.15s ease;
    }
    .cta:hover {
        background: #e78c62;
    }

    .status {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        margin: 12px 2px;
        min-height: 14px;
    }
    .status.error {
        color: var(--clay);
    }

    /* Two parallel option fields, sharing a baseline row. */
    .options {
        display: flex;
        justify-content: space-between;
        align-items: stretch;
        gap: 20px;
        margin-bottom: 18px;
    }
    .field {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 0;
    }
    .field-label {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
    }
    .field-control {
        display: flex;
        align-items: center;
        min-height: 34px;
    }

    /* Styling picker: one joined segmented control, not two detached pills. */
    .seg {
        display: inline-flex;
        border: 1px solid var(--hairline);
        border-radius: 8px;
        background: var(--surface);
        overflow: hidden;
    }
    .seg .tab {
        border: 0;
        border-radius: 0;
        background: transparent;
    }
    .seg .tab + .tab {
        border-left: 1px solid var(--hairline);
    }
    .seg .tab.active {
        color: var(--clay);
        background: rgba(245, 242, 234, 0.06);
    }

    .tabs {
        display: none;
        gap: 6px;
        margin-bottom: 8px;
    }
    .tab {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 7px 11px;
        border-radius: 7px;
        border: 1px solid var(--hairline);
        background: transparent;
        color: var(--muted);
        transition:
            color 0.15s ease,
            border-color 0.15s ease,
            background 0.15s ease;
    }
    .tab:hover {
        border-color: var(--hairline-strong);
    }
    .tab.active {
        color: var(--clay);
        border-color: var(--hairline-strong);
        background: var(--surface);
    }

    .code {
        display: none;
        flex: 1;
        min-height: 0;
        margin: 0;
        padding: 12px 14px;
        border: 1px solid var(--hairline);
        border-radius: 10px;
        background: var(--surface);
        overflow: auto;
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.55;
        white-space: pre;
        tab-size: 2;
        color: var(--text);
    }
    .c-tag {
        color: var(--clay);
    }
    .c-attr {
        color: var(--sand);
    }
    .c-str {
        color: var(--gold);
    }
    .c-com {
        color: var(--dim);
    }
    .c-punc {
        color: var(--muted);
    }

    .actions {
        display: none;
        gap: 10px;
        margin-top: 10px;
    }
    .ghost {
        flex: 1;
        padding: 11px 14px;
        border-radius: 9px;
        font-weight: 500;
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--hairline);
        transition: border-color 0.15s ease;
    }
    .ghost:hover {
        border-color: var(--hairline-strong);
    }

    footer {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 14px;
        padding: 13px 0 15px;
        border-top: 1px solid var(--hairline);
        font-family: var(--mono);
        font-size: 10px;
    }
    footer a {
        text-decoration: none;
    }
    .by {
        color: var(--muted);
        transition: color 0.15s ease;
    }
    .by:hover {
        color: var(--text);
    }
    .support {
        color: var(--clay);
        font-weight: 500;
    }
    .support:hover {
        text-decoration: underline;
    }
</style>

<div class="kicker">Design &rarr; HTML</div>
<h1>Export your <em>frame</em></h1>
<p class="sub">
    Select a frame, then export it to a self-contained HTML file with layout,
    colors, and Google fonts.
</p>

<div class="options">
    <div class="field">
        <span class="field-label">Output</span>
        <div class="field-control">
            <label class="toggle">
                <input type="checkbox" id="semantic" checked />
                <span class="box"></span>
                <span class="toggle-text">Semantic tags</span>
            </label>
        </div>
    </div>
    <div class="field">
        <span class="field-label">Styling</span>
        <div class="field-control">
            <div class="seg" id="framework">
                <button class="tab active" data-fw="css">CSS</button>
                <button class="tab" data-fw="tailwind">Tailwind</button>
            </div>
        </div>
    </div>
</div>

<button id="export" class="cta">Export selected frame</button>

<div id="status" class="status"></div>

<div class="tabs" id="tabs">
    <button class="tab active" data-mode="combined">HTML + CSS</button>
    <button class="tab" data-mode="html">HTML</button>
    <button class="tab" data-mode="css">CSS</button>
</div>

<pre class="code" id="output"></pre>

<div class="actions" id="actions">
    <button id="copy" class="ghost">Copy</button>
    <button id="download" class="ghost">Download .html</button>
</div>

<footer>
    <a
        class="by"
        href="https://abdulkadersafi.com"
        target="_blank"
        rel="noopener"
        >Created by Abdulkader Safi</a
    >
    <a
        class="support"
        href="https://ko-fi.com/abdulkadersafi"
        target="_blank"
        rel="noopener"
        >&#9829; Support on Ko-fi</a
    >
</footer>

<script>
    const $ = (id) => document.getElementById(id);
    const state = {
        name: "export",
        combined: "",
        html: "",
        css: "",
        mode: "combined",
        framework: "css",
    };

    const raw = () => state[state.mode];
    const ext = () => (state.mode === "css" ? "css" : "html");

    // --- syntax highlighting (offline, HTML + CSS) ---
    const esc = (s) =>
        s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const span = (cls, inner) =>
        '<span class="' + cls + '">' + inner + "</span>";

    function hlCSS(src) {
        const re =
            /(\/\*[\s\S]*?\*\/)|("[^"]*"|'[^']*')|(@[\w-]+)|(\*|[.#][\w-]+|[\w-]+)(?=[^{};]*\{)|([-\w]+)(\s*:\s*)([^;{}]*)(;?)|([{}])/g;
        let out = "",
            last = 0,
            m;
        while ((m = re.exec(src))) {
            out += esc(src.slice(last, m.index));
            if (m[1]) out += span("c-com", esc(m[1]));
            else if (m[2]) out += span("c-str", esc(m[2]));
            else if (m[3]) out += span("c-tag", esc(m[3]));
            else if (m[4]) out += span("c-tag", esc(m[4]));
            else if (m[5] !== undefined)
                out +=
                    span("c-attr", esc(m[5])) +
                    esc(m[6]) +
                    span("c-str", esc(m[7])) +
                    span("c-punc", esc(m[8]));
            else if (m[9]) out += span("c-punc", esc(m[9]));
            last = re.lastIndex;
            if (m.index === re.lastIndex) re.lastIndex++;
        }
        return out + esc(src.slice(last));
    }

    function hlTag(tag) {
        let first = true;
        return tag.replace(
            /(<\/?|\/?>|!DOCTYPE)|("[^"]*"|'[^']*')|(=)|([A-Za-z][\w:-]*)|(\s+)/g,
            (m, punc, str, eq, name, sp) => {
                if (punc) return span("c-punc", esc(punc));
                if (str) return span("c-str", esc(str));
                if (eq) return esc(eq);
                if (sp) return sp;
                if (name) {
                    if (first) {
                        first = false;
                        return span("c-tag", esc(name));
                    }
                    return span("c-attr", esc(name));
                }
                return esc(m);
            },
        );
    }

    function hlMarkup(src) {
        const toks = src.match(/<!--[\s\S]*?-->|<[^>]*>|[^<]+/g) || [];
        let out = "";
        for (const t of toks) {
            if (t.slice(0, 4) === "<!--") out += span("c-com", esc(t));
            else if (t[0] === "<") out += hlTag(t);
            else out += esc(t);
        }
        return out;
    }

    function hlHTML(src) {
        const parts = src.split(/(<style[^>]*>|<\/style>)/i);
        let out = "",
            inStyle = false;
        for (const p of parts) {
            if (!p) continue;
            if (/^<style/i.test(p)) {
                out += hlTag(p);
                inStyle = true;
            } else if (/^<\/style>/i.test(p)) {
                out += hlTag(p);
                inStyle = false;
            } else out += inStyle ? hlCSS(p) : hlMarkup(p);
        }
        return out;
    }

    // --- render + actions ---
    function render() {
        document
            .querySelectorAll("#tabs .tab")
            .forEach((t) =>
                t.classList.toggle("active", t.dataset.mode === state.mode),
            );
        $("output").innerHTML =
            state.mode === "css" ? hlCSS(raw()) : hlHTML(raw());
        $("output").scrollTop = 0;
        $("download").textContent = "Download ." + ext();
    }

    document.querySelectorAll("#tabs .tab").forEach((t) => {
        t.onclick = () => {
            state.mode = t.dataset.mode;
            render();
        };
    });

    // Framework selector. Tailwind is a single self-contained file, so the
    // HTML/CSS split tabs do not apply and the stale output is cleared on switch.
    document.querySelectorAll("#framework .tab").forEach((t) => {
        t.onclick = () => {
            if (t.dataset.fw === state.framework) return;
            state.framework = t.dataset.fw;
            document
                .querySelectorAll("#framework .tab")
                .forEach((b) =>
                    b.classList.toggle(
                        "active",
                        b.dataset.fw === state.framework,
                    ),
                );
            state.mode = "combined";
            show(false);
            setStatus(
                state.framework === "tailwind"
                    ? "Tailwind selected. Export to generate utility classes."
                    : "Plain CSS selected. Export to generate.",
            );
        };
    });

    $("export").onclick = () => {
        setStatus("Generating…");
        parent.postMessage(
            {
                pluginMessage: {
                    type: "export",
                    semantic: $("semantic").checked,
                    tailwind: state.framework === "tailwind",
                },
            },
            "*",
        );
    };

    $("copy").onclick = () => {
        const ta = document.createElement("textarea");
        ta.value = raw();
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        const what =
            state.mode === "css"
                ? "CSS"
                : state.mode === "html"
                  ? "HTML"
                  : "HTML and CSS";
        setStatus("Copied the " + what + " to clipboard.");
    };

    $("download").onclick = () => {
        const type = state.mode === "css" ? "text/css" : "text/html";
        const blob = new Blob([raw()], { type });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = state.name + "." + ext();
        a.click();
        URL.revokeObjectURL(a.href);
    };

    onmessage = (e) => {
        const msg = e.data.pluginMessage;
        if (!msg) return;
        if (msg.type === "error") {
            setStatus(msg.message, true);
            show(false);
        } else if (msg.type === "result") {
            state.name = msg.name || "export";
            state.combined = msg.combined;
            state.html = msg.html;
            state.css = msg.css;
            state.mode = "combined";
            show(true);
            render();
            setStatus(
                "Done. " +
                    msg.combined.split("\n").length +
                    " lines generated.",
            );
        }
    };

    function show(on) {
        // The HTML/CSS split only applies to CSS mode; Tailwind is one combined file.
        $("tabs").style.display =
            on && state.framework === "css" ? "flex" : "none";
        $("output").style.display = on ? "block" : "none";
        $("actions").style.display = on ? "flex" : "none";
    }

    function setStatus(text, isError) {
        const s = $("status");
        s.textContent = text;
        s.className = "status" + (isError ? " error" : "");
    }
</script>

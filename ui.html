<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
  rel="stylesheet"
/>

<style>
  /* Editorial workbench theme. Retheme by editing these. */
  :root {
    --bg: #0c0b0a;
    --surface: #16140f;
    --text: #f5f2ea;
    --muted: #8d887e;
    --hairline: rgba(245, 242, 234, 0.12);
    --hairline-strong: rgba(245, 242, 234, 0.22);
    --clay: #d97a4f;
    --display: "Space Grotesk", system-ui, sans-serif;
    --body: "Inter", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px 22px 18px;
    font-family: var(--body);
    font-size: 12px;
    color: var(--text);
    background:
      radial-gradient(120% 90% at 100% 0%, rgba(217, 122, 79, 0.06), transparent 55%),
      var(--bg);
  }

  .kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 12px;
  }

  h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 30px;
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin: 0 0 10px;
  }

  h1 em { color: var(--clay); font-style: normal; }

  .sub {
    color: var(--muted);
    line-height: 1.55;
    margin: 0 0 20px;
    max-width: 34ch;
  }

  button {
    font: inherit;
    cursor: pointer;
    border: none;
    border-radius: 9px;
  }
  button:disabled { opacity: 0.4; cursor: default; }

  .cta {
    width: 100%;
    padding: 13px 16px;
    font-weight: 600;
    color: #0c0b0a;
    background: var(--clay);
    transition: background 0.15s ease;
  }
  .cta:hover { background: #e78c62; }

  .status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin: 14px 2px;
    min-height: 15px;
  }
  .status.error { color: var(--clay); }

  textarea {
    display: none;
    width: 100%;
    height: 320px;
    padding: 12px;
    border: 1px solid var(--hairline);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    resize: vertical;
    white-space: pre;
  }

  .actions { display: none; gap: 10px; margin-top: 10px; }

  .ghost {
    flex: 1;
    padding: 11px 14px;
    font-weight: 500;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--hairline);
    transition: border-color 0.15s ease;
  }
  .ghost:hover { border-color: var(--hairline-strong); }

  .spacer { flex: 1; min-height: 22px; }

  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-top: 14px;
    border-top: 1px solid var(--hairline);
    font-family: var(--mono);
    font-size: 10px;
  }
  footer a { text-decoration: none; }
  .by { color: var(--muted); transition: color 0.15s ease; }
  .by:hover { color: var(--text); }
  .support { color: var(--clay); font-weight: 500; }
  .support:hover { text-decoration: underline; }
</style>

<div class="kicker">Design &rarr; HTML</div>
<h1>Export your <em>frame</em></h1>
<p class="sub">
  Select a frame, then export it to a self-contained HTML file with layout, colors, and Google fonts.
</p>

<button id="export" class="cta">Export selected frame</button>

<div id="status" class="status"></div>

<textarea id="output" readonly spellcheck="false"></textarea>

<div id="actions" class="actions">
  <button id="copy" class="ghost">Copy</button>
  <button id="download" class="ghost">Download .html</button>
</div>

<div class="spacer"></div>

<footer>
  <a class="by" href="https://abdulkadersafi.com" target="_blank" rel="noopener">Created by Abdulkader Safi</a>
  <a class="support" href="https://ko-fi.com/abdulkadersafi" target="_blank" rel="noopener">&#9829; Support on Ko-fi</a>
</footer>

<script>
  const $ = (id) => document.getElementById(id);
  let fileName = "export";

  $("export").onclick = () => {
    setStatus("Generating…");
    parent.postMessage({ pluginMessage: { type: "export" } }, "*");
  };

  $("copy").onclick = () => {
    $("output").select();
    document.execCommand("copy");
    setStatus("Copied to clipboard.");
  };

  $("download").onclick = () => {
    const blob = new Blob([$("output").value], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fileName + ".html";
    a.click();
    URL.revokeObjectURL(a.href);
  };

  onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;
    if (msg.type === "error") {
      setStatus(msg.message, true);
      $("output").style.display = "none";
      $("actions").style.display = "none";
    } else if (msg.type === "result") {
      fileName = msg.name || "export";
      $("output").value = msg.code;
      $("output").style.display = "block";
      $("actions").style.display = "flex";
      setStatus("Done. " + msg.code.split("\n").length + " lines generated.");
    }
  };

  function setStatus(text, isError) {
    const s = $("status");
    s.textContent = text;
    s.className = "status" + (isError ? " error" : "");
  }
</script>
